<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>
</head>

<body>

<h1>Edit Task</h1>

<form th:action="@{/tasks/{id}/edit(id=${task.id})}"
      th:object="${task}"
      method="post">

    <input type="text"
           th:field="*{title}"
           placeholder="Task title"
           required>

    <br><br>

    <textarea th:field="*{description}"
              placeholder="Description"></textarea>

    <br><br>

    <button type="submit">Save</button>

    <a th:href="@{/}">Cancel</a>

</form>

</body>
</html>
