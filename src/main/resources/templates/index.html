<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Todo App</title>
</head>

<body>

<h1>Todo App</h1>

<form th:action="@{/tasks}" th:object="${task}" method="post">

    <input
            type="text"
            th:field="*{title}"
            placeholder="Task title"
            required>

    <div th:if="${#fields.hasErrors('title')}"
         th:errors="*{title}">
    </div>

    <br><br>

    <textarea
            th:field="*{description}"
            placeholder="Description">
    </textarea>

    <div th:if="${#fields.hasErrors('description')}"
         th:errors="*{description}">
    </div>

    <br><br>

    <button type="submit">
        Add Task
    </button>

</form>

<hr>

<div>

    <a th:href="@{/}">
        All
    </a>

    |

    <a th:href="@{/(status='active')}">
        Active
    </a>

    |

    <a th:href="@{/(status='completed')}">
        Completed
    </a>

</div>

<br>

<h2>Task List</h2>

<div th:if="${#lists.isEmpty(tasks)}">
    <p>No tasks yet. Create your first task 🚀</p>
</div>

<ul th:unless="${#lists.isEmpty(tasks)}">

    <li th:each="task : ${tasks}">

        <form th:action="@{/tasks/{id}/toggle(id=${task.id})}"
                method="post"
                style="display:inline;">

            <button type="submit">

            <span th:if="${task.completed}">
                ☑
            </span>

                <span th:unless="${task.completed}">
                ☐
            </span>

            </button>

        </form>

        <span
                th:text="${task.title}"
                th:style="${task.completed}
        ? 'text-decoration: line-through;'
        : ''">
    </span>

        <form th:action="@{/tasks/{id}/delete(id=${task.id})}"
              method="post"
              style="display:inline;">
            <button type="submit"
                    onclick="return confirm('Delete this task?')">
                Delete
            </button>
            <a th:href="@{/tasks/{id}/edit(id=${task.id})}">
                Edit
            </a>
        </form>

        <p th:text="${task.description}"></p>

    </li>

</ul>

</body>
</html>
